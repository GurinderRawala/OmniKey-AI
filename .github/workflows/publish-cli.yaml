name: Publish Omnikey CLI to npm

on:
  push:
    branches:
      - main
    paths:
      - "cli/**"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # REQUIRED for npm trusted publishing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install CLI dependencies
        run: npm ci
        working-directory: ./cli

      - name: Build CLI
        run: npm run build
        working-directory: ./cli

      - name: Install main app dependencies
        run: npm ci

      - name: Build main app
        run: npm run build

      - name: Copy backend dist to CLI
        run: |
          rm -rf ./cli/backend-dist
          mkdir -p ./cli/backend-dist
          cp -R ./dist/* ./cli/backend-dist/

      - name: Verify CLI dist and backend-dist exist
        run: |
          if [ ! -d "./cli/dist" ]; then echo "dist directory missing!"; exit 1; fi
          if [ ! -d "./cli/backend-dist" ]; then echo "backend-dist directory missing!"; exit 1; fi

      - name: Publish to npm
        run: npm publish --access public
        working-directory: ./cli