name: Publish Omnikey CLI to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'cli/**'
      - 'telegram/**'
      - 'api/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance / trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Show versions
        run: |
          node -v
          yarn -v
          npm -v

      # ── Monorepo install + build use Yarn (single source of truth) ──────────
      - name: Install monorepo dependencies (yarn workspaces)
        run: yarn install --frozen-lockfile

      - name: Build all workspaces (api, telegram, cli)
        run: yarn build

      # ── Publish the CLI workspace with npm ──────────────────────────────────
      # Yarn 1's `yarn publish --non-interactive` does not pick up the auth
      # token that actions/setup-node writes into ~/.npmrc. The repo is set up
      # for npm publish (trusted publishing / OIDC — no token required), so we
      # use npm only for the publish step itself. The cli workspace ships its
      # own package-lock.json so a clean `npm publish` works without yarn's
      # workspace context.
      - name: Publish CLI to npm
        run: npm publish --access public --provenance
        working-directory: ./cli
