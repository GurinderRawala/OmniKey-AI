name: Publish Omnikey CLI to npm

on:
  push:
    branches:
      - main
    paths:
      - 'cli/**'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci
        working-directory: ./cli

      - name: Build CLI
        run: |
          npm run build
        working-directory: ./cli

      - name: Install main app dependencies
        run: npm ci

      - name: Build main app
        run: npm run build

      - name: Copy backend dist to CLI
        run: |
          rm -rf ./cli/backend-dist
          mkdir -p ./cli/backend-dist
          cp -R ./dist/* ./cli/backend-dist/

      - name: Verify CLI dist and backend-dist exist
        run: |
          if [ ! -d "./cli/dist" ]; then echo "dist directory missing!"; exit 1; fi
          if [ ! -d "./cli/backend-dist" ]; then echo "backend-dist directory missing!"; exit 1; fi

      - name: Authenticate with npm registry
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        working-directory: ./cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Test install from npm
        run: |
          npm install -g omnikey-cli
          omnikey --version || echo "CLI installed and version command ran"
