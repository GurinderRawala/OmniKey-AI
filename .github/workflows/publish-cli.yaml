name: Publish Omnikey CLI to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'cli/**'
      - 'telegram/**'
      - 'api/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # REQUIRED for npm trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Show versions
        run: |
          node -v
          yarn -v
          npm -v

      # ── Monorepo install + build use Yarn (single source of truth) ──────────
      - name: Install monorepo dependencies (yarn workspaces)
        run: yarn install --frozen-lockfile

      - name: Build all workspaces (api, telegram, cli)
        run: yarn build

      # ── Publish the CLI workspace with npm ──────────────────────────────────
      # The package is configured for npm trusted publishing — auth is done
      # via the GitHub OIDC token (id-token: write permission above) and
      # requires --provenance. This matches the workflow that was working
      # prior to the monorepo conversion.
      - name: Publish CLI to npm (trusted publishing)
        run: npm publish --access public --provenance
        working-directory: ./cli
