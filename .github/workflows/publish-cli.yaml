name: Publish Omnikey CLI to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'cli/**'
      - 'telegram/**'
      - 'api/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Show versions
        run: |
          node -v
          yarn -v
          npm -v

      # ── Monorepo install + build use Yarn (single source of truth) ──────────
      - name: Install monorepo dependencies (yarn workspaces)
        run: yarn install --frozen-lockfile

      - name: Build all workspaces (api, telegram, cli)
        run: yarn build

      # ── Publish the CLI workspace with npm ──────────────────────────────────
      # Plain `npm publish --access public`, matching the pre-monorepo workflow.
      # Provenance is intentionally NOT enabled here because the package on
      # npmjs.org is not configured as a trusted publisher for this repo —
      # adding `--provenance` made npm reject the upload with a confusing 404.
      - name: Publish CLI to npm
        run: npm publish --access public
        working-directory: ./cli
