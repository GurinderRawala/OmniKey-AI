name: Publish Omnikey CLI to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'cli/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # `registry-url` makes actions/setup-node write a project-scoped .npmrc
      # containing  //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN} .
      # `always-auth` forces npm to actually use it on publish (without this,
      # newer npm versions can skip the credential for unscoped packages).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'
          always-auth: true

      - name: Show versions
        run: |
          node -v
          yarn -v
          npm -v

      # ── Monorepo install + build use Yarn (single source of truth) ──────────
      - name: Install monorepo dependencies (yarn workspaces)
        run: yarn install --frozen-lockfile

      - name: Build all workspaces (api, telegram, cli)
        run: yarn build

      # ── Publish the CLI workspace with npm ──────────────────────────────────
      # NODE_AUTH_TOKEN is read by the .npmrc that actions/setup-node wrote.
      # No provenance / trusted-publishing — that broke with a 404 because the
      # package isn't registered as a trusted publisher on npmjs.org.
      - name: Publish CLI to npm
        run: npm publish --access public
        working-directory: ./cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
