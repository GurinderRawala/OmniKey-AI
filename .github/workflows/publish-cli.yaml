name: Publish Omnikey CLI to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'cli/**'
      - 'telegram/**'
      - 'api/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Show versions
        run: |
          node -v
          yarn -v

      - name: Install monorepo dependencies
        run: yarn install --frozen-lockfile

      - name: Build all workspaces (api, telegram, cli)
        run: yarn build

      # Yarn 1's `yarn publish --non-interactive` does NOT honor NODE_AUTH_TOKEN
      # or the `${NODE_AUTH_TOKEN}` placeholder that `setup-node` writes into
      # the runner's .npmrc — it tries to run `yarn login` and fails. Write a
      # literal-token .npmrc (workspace-scoped) so yarn picks the credential
      # up directly. The file lives in the cli/ working dir and is removed
      # after publish so the token never leaks into a cached layer.
      - name: Write npm auth file for yarn publish
        working-directory: ./cli
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is empty — set it in repo Settings → Secrets."
            exit 1
          fi
          {
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
            echo "registry=https://registry.npmjs.org/"
            echo "always-auth=true"
          } > .npmrc

      - name: Publish CLI to npm
        working-directory: ./cli
        run: yarn publish --access public --non-interactive --no-git-tag-version

      - name: Remove npm auth file
        if: always()
        working-directory: ./cli
        run: rm -f .npmrc
