name: Publish Omnikey CLI to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'cli/**'
      - 'telegram/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to required version
        run: npm install -g npm@latest

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Show npm config locations
        run: |
          npm config get userconfig
          npm config get registry

      - name: Install main app dependencies
        run: npm ci

      - name: Build main app
        run: npm run build

      - name: Install telegram dependencies
        run: yarn install --frozen-lockfile
        working-directory: ./telegram

      - name: Build telegram
        run: npm run build
        working-directory: ./telegram

      - name: Install CLI dependencies
        run: npm ci
        working-directory: ./cli

      - name: Build CLI
        run: npm run build
        working-directory: ./cli

      - name: Publish to npm
        run: npm publish --access public
        working-directory: ./cli
