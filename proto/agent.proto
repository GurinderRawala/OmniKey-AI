syntax = "proto3";

package omnikey;

// Bi-directional streaming RPC between the OmniKey macOS app and
// the backend agent. The macOS app sends user instructions and
// terminal output; the backend responds with LLM-generated agent
// messages that may contain <shell_script> or <final_answer> tags.
service AgentService {
  rpc AgentStream(stream AgentMessage) returns (stream AgentMessage);
}

message AgentMessage {
  // Opaque session identifier chosen by the client; all messages
  // for a single logical agent run share the same session_id.
  string session_id = 1;

  // Message sender, e.g. "client" or "agent"; primarily
  // informational for logging and debugging.
  string sender = 2;

  // Human-readable content of the message. This is what is fed
  // into the LLM as conversation context.
  string content = 3;

  // Optional flag used by the client when sending terminal
  // command output back to the backend.
  bool is_terminal_output = 4;

  // Optional error indicator (e.g. when a command fails); this
  // is treated as part of the conversation context as well.
  bool is_error = 5;
}